const STORE_KEY=“pfhq-v3”;

const fmt=(n,d=0)=>n>=0?`+${n.toLocaleString("zh-TW",{minimumFractionDigits:d,maximumFractionDigits:d})}`:n.toLocaleString(“zh-TW”,{minimumFractionDigits:d,maximumFractionDigits:d});
function calcPnl(s){const cost=s.avgPrice*s.shares,asset=s.currentPrice*s.shares,pnl=asset-cost;return{cost,asset,pnl,pct:cost>0?(pnl/cost)*100:0};}
function genHistory(total){const today=new Date();let v=total;const arr=[v];for(let i=1;i<10;i++){v-=(Math.random()-.48)*Math.abs(total)*.015;arr.unshift(v);}return arr.map((pnl,i)=>{const d=new Date(today);d.setDate(today.getDate()-(9-i));return{date:d.toLocaleDateString(“zh-TW”,{month:“numeric”,day:“numeric”}),pnl};});}

// ─── Live Price Engine ────────────────────────────────────────────────────────
// Strategy: try multiple data sources in sequence, use first that works
// Each fetcher returns { prices: {symbol: price}, source: string } or throws

// Source 1: Yahoo Finance via allorigins CORS proxy
async function fetchViaAllOrigins(symbols) {
const yahooUrl = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(",")}&fields=regularMarketPrice`;
const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`;
const res = await fetch(proxyUrl, {signal: AbortSignal.timeout(8000)});
if (!res.ok) throw new Error(`allorigins ${res.status}`);
const data = await res.json();
const results = data?.quoteResponse?.result;
if (!results?.length) throw new Error(“no results”);
const prices = {};
results.forEach(r => { if (r.regularMarketPrice > 0) prices[r.symbol] = r.regularMarketPrice; });
if (!Object.keys(prices).length) throw new Error(“empty prices”);
return { prices, source: “Yahoo/allorigins” };
}

const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;
const res = await fetch(proxyUrl, {signal: AbortSignal.timeout(8000)});
if (!res.ok) throw new Error(`corsproxy ${res.status}`);
const data = await res.json();
const results = data?.quoteResponse?.result;
if (!results?.length) throw new Error(“no results”);
const prices = {};
results.forEach(r => { if (r.regularMarketPrice > 0) prices[r.symbol] = r.regularMarketPrice; });
if (!Object.keys(prices).length) throw new Error(“empty prices”);
return { prices, source: “Yahoo/corsproxy” };
}

// Source 3: Yahoo Finance chart API (one by one, slower but most reliable)
async function fetchViaYahooChart(symbols) {
const prices = {};
const CHUNK = 5; // batch in groups to be polite
for (let i = 0; i < symbols.length; i += CHUNK) {
const chunk = symbols.slice(i, i + CHUNK);
await Promise.all(chunk.map(async sym => {
try {
const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`;
const res = await fetch(url, {
signal: AbortSignal.timeout(6000),
headers: {“User-Agent”: “Mozilla/5.0”}
});
if (!res.ok) return;
const data = await res.json();
const p = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
if (p > 0) prices[sym] = p;
} catch {}
}));
}
if (!Object.keys(prices).length) throw new Error(“chart API empty”);
return { prices, source: “Yahoo/chart” };
}

// Source 4: Stooq (no CORS, CSV format, works globally)
// Maps our tickers to Stooq format
function toStooq(ticker) {
// TW: 2330.TW -> 2330.tw, 0050.TW -> 0050.tw
// US: NVDA -> nvda.us
if (ticker.endsWith(”.TW”)) return ticker.replace(”.TW”,”.tw”);
if (ticker.endsWith(”.tw”)) return ticker;
return ticker.toLowerCase() + “.us”;
}
async function fetchOneStooq(sym) {
const sq = toStooq(sym);
const url = `https://stooq.com/q/l/?s=${sq}&f=l1`; // l1 = last price
const res = await fetch(url, {signal: AbortSignal.timeout(5000)});
if (!res.ok) throw new Error(`stooq ${res.status}`);
const text = await res.text();
const price = parseFloat(text.trim());
if (isNaN(price) || price <= 0) throw new Error(`stooq bad price: ${text}`);
return price;
}
async function fetchViaStooq(symbols) {
const prices = {};
await Promise.all(symbols.map(async sym => {
try { prices[sym] = await fetchOneStooq(sym); } catch {}
}));
if (!Object.keys(prices).length) throw new Error(“stooq empty”);
return { prices, source: “Stooq” };
}

// USD/TWD rate from multiple sources
async function fetchUsdRate() {
// Try open.er-api.com first
try {
const res = await fetch(“https://open.er-api.com/v6/latest/USD”, {signal: AbortSignal.timeout(5000)});
const d = await res.json();
if (d.rates?.TWD > 0) return d.rates.TWD;
} catch {}
// Try exchangerate-api
try {
const res = await fetch(“https://api.exchangerate-api.com/v4/latest/USD”, {signal: AbortSignal.timeout(5000)});
const d = await res.json();
if (d.rates?.TWD > 0) return d.rates.TWD;
} catch {}
// Try Yahoo TWD=X
try {
const res = await fetch(“https://query1.finance.yahoo.com/v8/finance/chart/TWD%3DX?interval=1d&range=1d”, {signal: AbortSignal.timeout(5000)});
const d = await res.json();
const p = d?.chart?.result?.[0]?.meta?.regularMarketPrice;
if (p > 0) return p;
} catch {}
return null;
}

// Master fetcher: tries sources in order
async function fetchAllPrices(symbols, onProgress) {
const sources = [
{name:“allorigins”, fn: ()=>fetchViaAllOrigins(symbols)},
{name:“corsproxy”,  fn: ()=>fetchViaCorsproxy(symbols)},
{name:“Yahoo chart”,fn: ()=>fetchViaYahooChart(symbols)},
{name:“Stooq”,      fn: ()=>fetchViaStooq(symbols)},
];
for (const src of sources) {
try {
onProgress && onProgress(`嘗試 ${src.name}…`);
const result = await src.fn();
return result;
} catch(e) {
console.log(`${src.name} failed:`, e.message);
}
}
throw new Error(“all sources failed”);
}

        {[["ALL","全部"],["TW","台股"],["US","美股"]].map(([v,l])=>(<button key={v} className={`fbtn ${mktFilter===v?`f-${v.toLowerCase()}`:""}`} onClick={()=>setMktFilter(v)}>{l}</button>))}
        <span className="count-label">{display.length} 檔</span>
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr>
            <th className="left">名稱</th>
            <th className="right">股數</th>
            <th className="right">均價</th>
            <th className="right" style={{color:status==="loading"?"#ffcc55":"#b0aec8"}}>現價{status==="loading"?"⟳":""}</th>
            <th className="right" onClick={()=>doSort("assetTWD")}>市值{sortK==="assetTWD"?(sortD>0?"↑":"↓"):""}</th>
            <th className="right" onClick={()=>doSort("pnlTWD")}>損益{sortK==="pnlTWD"?(sortD>0?"↑":"↓"):""}</th>
            <th className="right" onClick={()=>doSort("pnlPct")}>損益%{sortK==="pnlPct"?(sortD>0?"↑":"↓"):""}</th>
          </tr></thead>
          <tbody>
            {display.map((s,i)=>(
              <tr key={i}>
                <td><span className={`badge badge-${s.market.toLowerCase()}`}>{s.market}</span><span className="td-name" style={{marginLeft:5}}>{s.name}</span></td>
                <td className="td-num">{s.dispShares}</td>
                <td className="td-muted">{s.dispAvg}</td>
                <td className={`td-num ${status==="loading"?"price-dim":""}`} key={`${s.ticker}-${priceKey}`}
                  style={status==="ok"?{animation:"flash .8s ease"}:{}}>{s.dispCurrent}</td>
                <td className="td-num">{Math.round(s.assetTWD).toLocaleString()}</td>
                <td className="td-pnl" style={{color:s.pnlTWD>=0?"#3ddd88":"#ff6060"}}>{fmt(Math.round(s.pnlTWD))}</td>
                <td className="td-pct"><span className={`pct-badge ${s.pnlPct>=0?"pct-pos":"pct-neg"}`}>{fmt(s.pnlPct,2)}%</span></td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr>
            <td colSpan={4} style={{fontFamily:"Syne,sans-serif",fontWeight:700,color:"#c8b8ff",fontSize:13}}>合計</td>
            <td className="td-num" style={{fontWeight:600}}>{Math.round(totalAsset).toLocaleString()}</td>
            <td className="td-pnl" style={{fontWeight:700,color:totalPnl>=0?"#3ddd88":"#ff6060",fontSize:13}}>{fmt(Math.round(totalPnl))}</td>
            <td className="td-pct"><span className={`pct-badge ${totalPct>=0?"pct-pos":"pct-neg"}`}>{fmt(totalPct,2)}%</span></td>
          </tr></tfoot>
        </table>
      </div>
    </>)}

    {tab==="history"&&(<>
      <div className="card" style={{padding:14,marginBottom:12}}>
        <div className="sc-label" style={{marginBottom:12}}>近10日損益趨勢（模擬估算）</div>
        <div className="bar-chart">{history.map((h,i)=>{const p=Math.abs(h.pnl)/maxAbs,pos=h.pnl>=0;return(<div key={i} className="bar-col"><div className="bar-val" style={{color:pos?"#3ddd88":"#ff6060"}}>{(h.pnl/1e4).toFixed(0)}萬</div><div className="bar-inner"><div className="bar-fill" style={{height:`${Math.max(p*100,4)}%`,background:pos?"linear-gradient(180deg,#3ddd8890,#3ddd8840)":"linear-gradient(180deg,#ff606090,#ff606040)"}}/></div><div className="bar-date">{h.date}</div></div>);})}</div>
      </div>
      <div className="hist-cards">{history.map((h,i)=>{const prev=i>0?history[i-1].pnl:h.pnl,d=h.pnl-prev,pos=h.pnl>=0,dp=d>=0;return(<div key={i} className="hist-card"><div className="hist-date">{h.date}</div><div className="hist-val" style={{color:pos?"#3ddd88":"#ff6060"}}>{(h.pnl/1e4).toFixed(1)}萬</div>{i>0&&<div className="hist-delta" style={{color:dp?"#3ddd88":"#ff6060"}}>{dp?"▲":"▼"} {Math.abs(d/1e4).toFixed(1)}萬</div>}<div className="hist-pct">{((h.pnl/totalCost)*100).toFixed(2)}%</div></div>);})}</div>
      <div className="hist-note">※ 近10日為模擬估算值，實際請依券商帳戶為準</div>
    </>)}
  </div>
</div>
```

);
}
ReactDOM.createRoot(document.getElementById(“app”)).render(<App/>);
</script>
