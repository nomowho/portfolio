</div>

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n,d=0){
  const abs=Math.abs(n);
  const s=abs.toLocaleString("zh-TW",{minimumFractionDigits:d,maximumFractionDigits:d});
  return n>=0?"+"+s:"-"+s;
}
function calcPnl(s){
  const cost=s.avgPrice*s.shares,asset=s.currentPrice*s.shares,pnl=asset-cost;
  return{cost,asset,pnl,pct:cost>0?(pnl/cost)*100:0};
}
function colorFor(v){return v>=0?"#3ddd88":"#ff6060";}
function genHistory(total){
  const today=new Date();let v=total;const arr=[v];
  for(let i=1;i<10;i++){v-=(Math.random()-.48)*Math.abs(total)*.015;arr.unshift(v);}
  return arr.map((pnl,i)=>{const d=new Date(today);d.setDate(today.getDate()-(9-i));
    return{date:d.toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"}),pnl};});
}
function getAllStocks(){
  return[
    ...twStocks.map(s=>{const{cost,asset,pnl,pct}=calcPnl(s);return{...s,pnlTWD:pnl,assetTWD:asset,costTWD:cost,pnlPct:pct,
      dShares:s.shares%1?s.shares.toFixed(2):s.shares.toLocaleString(),
      dAvg:s.avgPrice.toFixed(2),dCur:s.currentPrice.toFixed(2)};}),
    ...usStocks.map(s=>{const{cost,asset,pnl,pct}=calcPnl(s);return{...s,pnlTWD:pnl*usdRate,assetTWD:asset*usdRate,costTWD:cost*usdRate,pnlPct:pct,
      dShares:s.shares%1?s.shares.toFixed(3):s.shares.toLocaleString(),
      dAvg:"$"+s.avgPrice.toFixed(3),dCur:"$"+s.currentPrice.toFixed(3)};})
  ];
}

// US: Finnhub
async function fetchFinnhub(symbol){
  const url=`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_KEY}`;
  const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
  if(!r.ok)throw new Error("finnhub "+r.status);
  const d=await r.json();
  const price=d.c>0?d.c:d.pc;
  if(!price||price<=0)throw new Error("no price");
  return price;
}

// TW: TWSE batch — try multiple proxies in sequence
async function fetchAllTWPrices(stocks){
  // Mark each stock as tse or otc based on ticker prefix rules:
  // OTC (上櫃): 4xxx, 6xxx, 8xxx ranges + known ETFs on OTC
  // Everything else: TSE (上市)
  function getExchange(ticker){
    const n=parseInt(ticker);
    if(ticker.startsWith("006")||ticker.startsWith("00")){
      // Most ETFs are TSE; a few are OTC — default tse
      return"tse";
    }
    if((n>=4000&&n<=4999)||(n>=5000&&n<=5999&&n!==5871)||(n>=6000&&n<=6999)||
       (n>=8000&&n<=8999))return"otc";
    return"tse";
  }

  const query=stocks.map(s=>`${getExchange(s.ticker)}_${s.ticker}.tw`).join("|");
  const twseUrl=`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${encodeURIComponent(query)}&json=1&delay=0`;

  const proxies=[
    `https://corsproxy.io/?${encodeURIComponent(twseUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(twseUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(twseUrl)}`,
  ];

  for(const proxyUrl of proxies){
    try{
      const r=await fetch(proxyUrl,{signal:AbortSignal.timeout(10000)});
      if(!r.ok)continue;
      const d=await r.json();
      const items=d?.msgArray||[];
      if(!items.length)continue;
      const map={};
      for(const item of items){
        const code=item.c;
        const price=parseFloat(item.z&&item.z!=="-"?item.z:item.y);
        if(code&&!isNaN(price)&&price>0)map[code]=price;
      }
      if(Object.keys(map).length>0)return map;
    }catch(e){console.log("TW proxy failed:",proxyUrl,e.message);}
  }
  throw new Error("all TW proxies failed");
}

// USD/TWD rate
async function fetchUsdRate(){
  try{
    const r=await fetch("https://open.er-api.com/v6/latest/USD",{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    if(d.rates?.TWD>0)return d.rates.TWD;
  }catch{}
  try{
    const r=await fetch("https://finnhub.io/api/v1/forex/rates?base=USD&token="+FINNHUB_KEY,{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    if(d.quote?.TWD>0)return d.quote.TWD;
  }catch{}
  return null;
}

// ── Master Refresh ────────────────────────────────────────────────────────────
async function refreshPrices(){
  const btn=document.getElementById("btn-refresh");
  btn.disabled=true;btn.textContent="⟳ 更新中…";
  setStatus("loading","連接中…");

  // Fetch rate concurrently
  fetchUsdRate().then(r=>{
    if(r&&r>0){usdRate=parseFloat(r.toFixed(2));document.getElementById("rate-display").textContent=usdRate.toFixed(2);}
  });

  let twUpdated=0,twFailed=0,usUpdated=0,usFailed=0;

  // ── TW stocks: one batch request via TWSE ──
  setStatus("loading","更新台股中…");
  try{
    const priceMap=await fetchAllTWPrices(twStocks);
    twStocks=twStocks.map(s=>{
      const p=priceMap[s.ticker];
      if(p&&p>0){twUpdated++;return{...s,currentPrice:p};}
      twFailed++;return s;
    });
  }catch(e){
    console.log("TW batch failed:",e.message);
    twFailed=twStocks.length;
  }

  // ── US stocks via Finnhub (staggered) ──
  setStatus("loading",`更新美股中… 0/${usStocks.length}`);
  for(let i=0;i<usStocks.length;i++){
    const s=usStocks[i];
    setStatus("loading",`更新美股中… ${i+1}/${usStocks.length}`);
    try{
      const p=await fetchFinnhub(s.ticker);
      usStocks[i]={...s,currentPrice:p};
      usUpdated++;
    }catch{usFailed++;}
    if(i<usStocks.length-1)await new Promise(r=>setTimeout(r,120));
  }

  saveData();
  const total=twUpdated+usUpdated;
  const failed=twFailed+usFailed;
  const now=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  historyData=genHistory(getAllStocks().reduce((a,s)=>a+s.pnlTWD,0));

  if(failed===0){
    setStatus("ok",`✓ 全部 ${total} 檔更新完成（台${twUpdated} 美${usUpdated}）`,now);
    showToast(`✓ ${total} 檔即時股價更新完成`);
  }else if(total>0){
    setStatus("warn",`已更新 ${total} 檔，${failed} 檔失敗（台-${twFailed} 美-${usFailed}）`,now);
    showToast(`⚠ 更新 ${total} 檔，${failed} 檔失敗`,"#ffcc55");
  }else{
    setStatus("err","全部失敗，請確認網路連線");
    showToast("✕ 無法取得報價","#ff6060");
  }

  renderAll();
  btn.disabled=false;btn.textContent="⟳ 更新報價";
}

  const losers=[...all].sort((a,b)=>a.pnlTWD-b.pnlTWD).slice(0,5);

    return arr.map((s,i)=>`<div class="rank-row">
      <div class="rank-left"><span class="rank-num">${i+1}</span><span class="badge ${s.market==="TW"?"tw":"us"}">${s.market}</span><span class="rank-name">${s.name}</span></div>

    </div>`).join("");
  }
  const bars=[...all].sort((a,b)=>b.assetTWD-a.assetTWD).slice(0,28).map((s,i)=>{

    return`<div style="width:${p}%;background:hsl(${h},65%,${l}%)" title="${s.name}: ${p.toFixed(1)}%"></div>`;

  document.getElementById("content").innerHTML=`

        <span><span class="ldot" style="background:hsl(42,65%,42%)"></span>台股</span>
        <span><span class="ldot" style="background:hsl(210,65%,42%)"></span>美股</span>
        <span style="margin-left:auto">NT$ ${(totalAsset/1e4).toFixed(0)} 萬</span>
      </div>
    </div>`;
}

function renderStocks(){

  if(marketFilter!=="ALL")all=all.filter(s=>s.market===marketFilter);
  if(searchTerm)all=all.filter(s=>s.name.toLowerCase().includes(searchTerm)||s.ticker.toLowerCase().includes(searchTerm));
  all.sort((a,b)=>sortDir*((a[sortKey]||0)-(b[sortKey]||0)));
  const totalAll=getAllStocks();
  const tPnl=totalAll.reduce((a,s)=>a+s.pnlTWD,0);
  const tAsset=totalAll.reduce((a,s)=>a+s.assetTWD,0);
  const tCost=totalAll.reduce((a,s)=>a+s.costTWD,0);
  const tPct=tCost>0?(tPnl/tCost)*100:0;
  function sarr(k){return sortKey===k?(sortDir>0?"↑":"↓"):"↕";}
  const rows=all.map(s=>`<tr>
    <td><span class="badge ${s.market==="TW"?"tw":"us"}">${s.market}</span> <span style="color:#f0eeff">${s.name}</span></td>
    <td class="td-r">${s.dShares}</td><td class="td-m">${s.dAvg}</td><td class="td-r">${s.dCur}</td>
    <td class="td-r">${Math.round(s.assetTWD).toLocaleString()}</td>
    <td class="td-p" style="color:${colorFor(s.pnlTWD)}">${fmt(Math.round(s.pnlTWD))}</td>
    <td class="td-pct"><span class="${s.pnlPct>=0?"ppos":"pneg"}">${fmt(s.pnlPct,2)}%</span></td>
  </tr>`).join("");
  document.getElementById("content").innerHTML=`
    <div class="filter-row">
      <input class="search" id="search-input" placeholder="搜尋名稱或代號…" value="${searchTerm}">
      <button class="fbtn ${marketFilter==="ALL"?"f-all":""}" data-mkt="ALL">全部</button>
      <button class="fbtn ${marketFilter==="TW"?"f-tw":""}" data-mkt="TW">台股</button>
      <button class="fbtn ${marketFilter==="US"?"f-us":""}" data-mkt="US">美股</button>
      <span class="count">${all.length} 檔</span>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th class="l">名稱</th><th class="r">股數</th><th class="r">均價</th><th class="r">現價</th>
        <th class="r" data-sort="assetTWD">市值${sarr("assetTWD")}</th>
        <th class="r" data-sort="pnlTWD">損益${sarr("pnlTWD")}</th>
        <th class="r" data-sort="pnlPct">損益%${sarr("pnlPct")}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="4" style="font-family:'Syne',sans-serif;font-weight:700;color:#c8b8ff;font-size:13px">合計</td>
        <td class="td-r" style="font-weight:600">${Math.round(tAsset).toLocaleString()}</td>
        <td class="td-p" style="color:${colorFor(tPnl)};font-weight:700;font-size:13px">${fmt(Math.round(tPnl))}</td>
        <td class="td-pct"><span class="${tPct>=0?"ppos":"pneg"}">${fmt(tPct,2)}%</span></td>
      </tr></tfoot>
    </table></div>`;
  document.getElementById("search-input").addEventListener("input",e=>{searchTerm=e.target.value.toLowerCase();renderStocks();});
  document.querySelectorAll("[data-mkt]").forEach(b=>b.addEventListener("click",()=>{marketFilter=b.dataset.mkt;renderStocks();}));
  document.querySelectorAll("[data-sort]").forEach(th=>th.addEventListener("click",()=>{
    const k=th.dataset.sort;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1;}renderStocks();
  }));
}

function renderHistory(){
  if(!historyData.length){const all=getAllStocks();historyData=genHistory(all.reduce((a,s)=>a+s.pnlTWD,0));}
  const maxAbs=Math.max(...historyData.map(h=>Math.abs(h.pnl)));
  const bars=historyData.map(h=>{
    const p=Math.abs(h.pnl)/maxAbs,pos=h.pnl>=0;
    return`<div class="bar-col">
      <div class="bar-lbl" style="color:${pos?"#3ddd88":"#ff6060"}">${(h.pnl/1e4).toFixed(0)}萬</div>
      <div class="bar-inner"><div class="bar-fill" style="height:${Math.max(p*100,4)}%;background:${pos?"linear-gradient(180deg,#3ddd8890,#3ddd8840)":"linear-gradient(180deg,#ff606090,#ff606040)"}"></div></div>
      <div class="bar-date">${h.date}</div>
    </div>`;
  }).join("");
  const all=getAllStocks();
  const tCost=all.reduce((a,s)=>a+s.costTWD,0);
  const cards=historyData.map((h,i)=>{
    const prev=i>0?historyData[i-1].pnl:h.pnl,d=h.pnl-prev,pos=h.pnl>=0,dp=d>=0;
    return`<div class="hist-card">
      <div class="hist-date">${h.date}</div>
      <div class="hist-val" style="color:${pos?"#3ddd88":"#ff6060"}">${(h.pnl/1e4).toFixed(1)}萬</div>
      ${i>0?`<div class="hist-delta" style="color:${dp?"#3ddd88":"#ff6060"}">${dp?"▲":"▼"} ${Math.abs(d/1e4).toFixed(1)}萬</div>`:""}
      <div class="hist-pct">${((h.pnl/tCost)*100).toFixed(2)}%</div>
    </div>`;
  }).join("");
  document.getElementById("content").innerHTML=`
    <div class="rank-card" style="margin-bottom:12px">
      <div class="sc-l" style="margin-bottom:12px">近10日損益趨勢（模擬估算）</div>
      <div class="bar-chart">${bars}</div>
    </div>
    <div class="hist-grid">${cards}</div>
    <div class="note">※ 近10日為模擬估算值，實際請依券商帳戶為準</div>`;
}

    <span class="ac-meta">${s.ticker}</span>
    <span class="ac-meta">${s.shares.toLocaleString()}股</span>
  </div>`).join("");
  ac.classList.add("show");
  ac.querySelectorAll(".ac-row").forEach(row=>row.addEventListener("click",()=>{
    const name=row.dataset.name;
    document.getElementById("m-name").value=name;
    document.getElementById("m-ticker").value=row.dataset.ticker;
    document.getElementById("m-curprice").value=row.dataset.cur;
    ac.classList.remove("show");
    matchedStock=(tradeMarket==="TW"?twStocks:usStocks).find(s=>s.name===name)||null;
    document.getElementById("m-curprice-wrap").style.display="none";
    updatePreview();
  }));
  matchedStock=stocks.find(s=>s.name.toLowerCase()===q||s.ticker.toLowerCase()===q)||null;
  updatePreview();
});

function updatePreview(){
  const prev=document.getElementById("m-preview");
  const after=document.getElementById("m-prev-after");
  if(!matchedStock){prev.style.display="none";return;}
  prev.style.display="block";
  const s=matchedStock,isTW=s.market==="TW";
  document.getElementById("m-prev-grid").innerHTML=`
    <div><div class="pil">持股數</div><div class="piv">${s.shares%1?s.shares.toFixed(3):s.shares.toLocaleString()}</div></div>
    <div><div class="pil">均價</div><div class="piv">${isTW?s.avgPrice.toFixed(2):"$"+s.avgPrice.toFixed(3)}</div></div>
    <div><div class="pil">現價</div><div class="piv">${isTW?s.currentPrice.toFixed(2):"$"+s.currentPrice.toFixed(3)}</div></div>`;
  const p=parseFloat(document.getElementById("m-price").value);
  const q=parseFloat(document.getElementById("m-qty").value);
  if(!isNaN(p)&&!isNaN(q)&&p>0&&q>0){
    if(tradeMode==="buy"){
      const ns=s.shares+q,na=(s.avgPrice*s.shares+p*q)/ns;
      document.getElementById("m-after-lbl").textContent="加倉後均價";
      document.getElementById("m-after-val").textContent=na.toFixed(3);
      after.style.display="flex";
    }else{
      document.getElementById("m-after-lbl").textContent="減倉後持股";
      document.getElementById("m-after-val").textContent=(s.shares-q).toLocaleString()+" 股";
      after.style.display="flex";
    }
  }else{after.style.display="none";}
}

document.getElementById("m-price").addEventListener("input",updatePreview);
document.getElementById("m-qty").addEventListener("input",updatePreview);
document.getElementById("m-name").addEventListener("blur",function(){
  if(!matchedStock&&this.value.trim())document.getElementById("m-curprice-wrap").style.display="block";
});

document.getElementById("m-confirm").addEventListener("click",()=>{
  const err=document.getElementById("m-err");
  err.style.display="none";
  const name=document.getElementById("m-name").value.trim();
  const ticker=document.getElementById("m-ticker").value.trim();
  const price=parseFloat(document.getElementById("m-price").value);
  const qty=parseFloat(document.getElementById("m-qty").value);
  const curPrice=parseFloat(document.getElementById("m-curprice").value)||price;
  if(!name){err.textContent="請輸入股票名稱或代號";err.style.display="block";return;}
  if(isNaN(price)||price<=0){err.textContent="請輸入有效的成交價格";err.style.display="block";return;}
  if(isNaN(qty)||qty<=0){err.textContent="請輸入有效的數量";err.style.display="block";return;}
  if(tradeMode==="sell"&&matchedStock&&qty>matchedStock.shares){err.textContent=`減倉數量不得超過現有 ${matchedStock.shares.toLocaleString()} 股`;err.style.display="block";return;}
  const stocks=tradeMarket==="TW"?twStocks:usStocks;
  const idx=stocks.findIndex(s=>s.name===name||(ticker&&s.ticker===ticker));
  if(tradeMode==="buy"){
    if(idx>=0){const s=stocks[idx],ns=s.shares+qty;stocks[idx]={...s,shares:ns,avgPrice:(s.avgPrice*s.shares+price*qty)/ns,currentPrice:curPrice||s.currentPrice};showToast(`✓ 加倉 ${name} ${qty.toLocaleString()} 股`);}
    else{stocks.push({name,ticker,shares:qty,avgPrice:price,currentPrice:curPrice||price,market:tradeMarket});showToast(`✓ 新增 ${name} ${qty.toLocaleString()} 股`);}
  }else{
    if(idx<0){closeModal();return;}
    const rem=stocks[idx].shares-qty;
    if(rem<=0){stocks.splice(idx,1);showToast(`✓ 清倉 ${name}`,"#ff6060");}
    else{stocks[idx]={...stocks[idx],shares:rem};showToast(`✓ 減倉 ${name} ${qty.toLocaleString()} 股`,"#ff6060");}
  }
  if(tradeMarket==="TW")twStocks=[...stocks];else usStocks=[...stocks];
  saveData();closeModal();renderAll();
});

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById("btn-refresh").addEventListener("click",refreshPrices);
historyData=genHistory(getAllStocks().reduce((a,s)=>a+s.pnlTWD,0));
renderAll();
refreshPrices();
</script>
